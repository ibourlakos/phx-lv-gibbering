<!--
  #98 Reference entity token — DST-inspired human-scale character at 64×64 viewBox.

  The entity bounding box is always 64×64 SVG units (a square), rendered billboard-style
  (upright, never rotated). The entity sprite is positioned via IsoProjection.sprite_pos/2
  which returns the top-left corner of this 64×64 box.

  Proportion conventions established here:
  - Sprite box:       64×64 SVG units
  - Head diameter:    14 units (circle, centred at x=32, y=22)
  - Body width:       20 units, body height: 26 units (rect at x=22, y=32)
  - Feet/shadow base: y≈58, aligns with tile diamond bottom when sprite_pos offsets correctly
  - HP bar:           56×5 units at y=2 (top of bounding box); 4px margin each side
  - Selection ring:   diamond polygon at tile coordinate (same as tile-reference.svg shape)
                      rendered outside this 64×64 box in the SVG scene layer

  Outline technique:
  - stroke="#0a0a0a" (near-black, var(--outline)), stroke-width="3"
  - Closed paths only — open strokes look cleaner but lack the hand-drawn weight
  - stroke-linejoin="round" on angular shapes softens corners

  This file renders standalone in Firefox and Chrome without any JS or server.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-16 -16 160 160"
     width="384" height="384"
     style="background:#111827">

  <defs>
    <!-- Subtle inner shadow for the body (gives depth without raster) -->
    <filter id="body-depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="2" dy="3" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- ---- Bounding box guide (not rendered in game) ---- -->
  <rect x="0" y="0" width="64" height="64" fill="none" stroke="#1f2937" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ---- HP bar (at y=2, 4px margin each side, 5px tall) ---- -->
  <!-- HP bar background -->
  <rect x="4" y="2" width="56" height="5" rx="2" fill="#1f2937"/>
  <!-- HP bar fill (example: 75% health = green) -->
  <rect x="4" y="2" width="42" height="5" rx="2" fill="#16a34a"/>
  <!-- HP bar fill transition example (at 30% = red) -->
  <!-- Shown as a second token to the right -->

  <!-- ---- Hero token (human fighter) ---- -->
  <!-- Feet / ground shadow (oval, very dark, subtle) -->
  <ellipse cx="32" cy="58" rx="10" ry="3" fill="#000000" opacity="0.4"/>

  <!-- Legs (simple rect, dark) -->
  <rect x="26" y="50" width="6" height="10" rx="1"
        fill="#162a3d" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="32" y="50" width="6" height="10" rx="1"
        fill="#162a3d" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Body (torso) -->
  <rect x="22" y="30" width="20" height="24" rx="3"
        fill="#1d3354" stroke="#0a0a0a" stroke-width="3" stroke-linejoin="round"/>

  <!-- Shield (left arm) -->
  <rect x="12" y="33" width="10" height="14" rx="2"
        fill="#1a2d46" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Shield emblem (simple cross) -->
  <line x1="17" y1="35" x2="17" y2="45" stroke="#4b5563" stroke-width="1"/>
  <line x1="13" y1="40" x2="21" y2="40" stroke="#4b5563" stroke-width="1"/>

  <!-- Sword (right arm, angled) -->
  <line x1="48" y1="26" x2="38" y2="42"
        stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <!-- Sword crossguard -->
  <line x1="43" y1="38" x2="47" y2="34"
        stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="32" cy="22" r="9"
          fill="#24406a" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Helmet visor (simple line detail) -->
  <line x1="26" y1="21" x2="38" y2="21"
        stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ---- Selection ring (diamond at tile position) ---- -->
  <!-- In the actual scene this is rendered in the SVG layer below, not inside the entity box.
       Shown here purely for reference sizing. The diamond corresponds to one 64×32 tile. -->
  <g transform="translate(-32, 56)" opacity="0.6">
    <polygon points="32,0 64,16 32,32 0,16"
             fill="none" stroke="#ffffff" stroke-width="2.5"
             stroke-dasharray="0"/>
    <text x="32" y="42" fill="#6b7280" font-size="5" font-family="monospace" text-anchor="middle">
      selection ring (tile layer, not in sprite)
    </text>
  </g>

  <!-- ---- Active turn ring (dashed amber) for reference ---- -->
  <g transform="translate(-32, 56)" opacity="0.4">
    <polygon points="32,0 64,16 32,32 0,16"
             fill="none" stroke="#f59e0b" stroke-width="2"
             stroke-dasharray="4 3"/>
  </g>

  <!-- ---- Second token to the right: low HP state ---- -->
  <g transform="translate(96, 0)">
    <!-- HP bar background -->
    <rect x="4" y="2" width="56" height="5" rx="2" fill="#1f2937"/>
    <!-- Low HP (22% = red) -->
    <rect x="4" y="2" width="12" height="5" rx="2" fill="#dc2626"/>

    <ellipse cx="32" cy="58" rx="10" ry="3" fill="#000000" opacity="0.4"/>
    <rect x="26" y="50" width="6" height="10" rx="1"
          fill="#162a3d" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="32" y="50" width="6" height="10" rx="1"
          fill="#162a3d" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="22" y="30" width="20" height="24" rx="3"
          fill="#1d3354" stroke="#0a0a0a" stroke-width="3" stroke-linejoin="round"/>
    <rect x="12" y="33" width="10" height="14" rx="2"
          fill="#1a2d46" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="17" y1="35" x2="17" y2="45" stroke="#4b5563" stroke-width="1"/>
    <line x1="13" y1="40" x2="21" y2="40" stroke="#4b5563" stroke-width="1"/>
    <line x1="48" y1="26" x2="38" y2="42"
          stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="43" y1="38" x2="47" y2="34"
          stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="22" r="9"
            fill="#24406a" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="26" y1="21" x2="38" y2="21"
          stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
    <text x="32" y="76" fill="#9ca3af" font-size="5" font-family="monospace" text-anchor="middle">
      low HP (22%)
    </text>
  </g>

  <!-- ---- Annotations ---- -->
  <!-- Bounding box dimensions -->
  <line x1="0" y1="-8" x2="64" y2="-8" stroke="#4b5563" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="32" y="-10" fill="#6b7280" font-size="5" font-family="monospace" text-anchor="middle">64 units</text>
  <line x1="-8" y1="0" x2="-8" y2="64" stroke="#4b5563" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="-10" y="32" fill="#6b7280" font-size="5" font-family="monospace" text-anchor="middle"
        transform="rotate(-90,-10,32)">64 units</text>

  <!-- Proportion callouts -->
  <line x1="66" y1="2" x2="66" y2="7" stroke="#6b7280" stroke-width="0.5"/>
  <text x="68" y="6" fill="#6b7280" font-size="4" font-family="monospace">HP bar y=2, h=5</text>
  <line x1="66" y1="22" x2="66" y2="22" stroke="#6b7280" stroke-width="0.5"/>
  <text x="68" y="23" fill="#6b7280" font-size="4" font-family="monospace">head cy=22, r=9</text>
  <text x="68" y="40" fill="#6b7280" font-size="4" font-family="monospace">body y=30, h=24, w=20</text>
  <text x="68" y="57" fill="#6b7280" font-size="4" font-family="monospace">feet/shadow y≈58</text>

  <!-- Title -->
  <text x="32" y="-14" fill="#9ca3af" font-size="6" font-family="monospace" text-anchor="middle"
        font-weight="bold">
    Entity Reference Token — 64×64 sprite box
  </text>
</svg>
