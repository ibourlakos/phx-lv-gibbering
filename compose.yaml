services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      MIX_ENV: dev
      DATABASE_URL: ecto://gibbering:gibbering@db/gibbering_dev
      SECRET_KEY_BASE: dev_secret_key_base_changeme_in_prod
      PHX_HOST: localhost
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps_cache:/app/deps
      - build_cache:/app/_build
      - npm_cache:/app/assets/node_modules
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gibbering
      POSTGRES_PASSWORD: gibbering
      POSTGRES_DB: gibbering_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gibbering -d gibbering_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  deps_cache:
  build_cache:
  npm_cache: