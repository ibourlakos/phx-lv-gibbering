services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ecto://gibbering:gibbering@db/gibbering_dev
      SECRET_KEY_BASE: dev_secret_key_base_changeme_in_prod
      PHX_HOST: localhost
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps_cache:/app/deps
      - build_cache:/app/_build
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    stdin_open: true
    tty: true

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-jammy
    profiles:
      - smoke
    working_dir: /smoke
    volumes:
      - ./test/smoke:/smoke
    environment:
      BASE_URL: http://app:4000
    command: >
      bash -c "npm ci --prefer-offline && npx playwright test"
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gibbering
      POSTGRES_PASSWORD: gibbering
      POSTGRES_DB: gibbering_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gibbering -d gibbering_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  deps_cache:
  build_cache:
